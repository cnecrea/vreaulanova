name: Raportare problemă
description: Raportați o problemă legată de integrarea Nova Power & Gas.
title: "[BUG] Descriere scurtă a problemei"
labels: ajutor necesar
body:
  - type: markdown
    attributes:
      value: >
        ⚠️ **ATENȚIE:** ⚠️

        Înainte de a raporta o problemă, te rog să verifici:

        1. [**FAQ.md**](https://github.com/cnecrea/vreaulanova/blob/main/FAQ.md) — întrebări frecvente și comportamente așteptate

        2. [**DEBUG.md**](https://github.com/cnecrea/vreaulanova/blob/main/DEBUG.md) — cum activezi loguri debug și cum interpretezi erorile

        Dacă problema persistă după ce ai consultat documentația, completează informațiile de mai jos.

  - type: dropdown
    id: citit_documentatie
    attributes:
      label: Ați citit documentația (FAQ.md + DEBUG.md)?
      description: Te rog să confirmi că ai citit ambele fișiere înainte de a raporta problema.
      options:
        - "Selectează o opțiune…"
        - "Nu, nu am citit documentația."
        - "Da, am citit FAQ.md și DEBUG.md și nu am găsit răspunsul la problema mea."
    validations:
      required: true

  - type: textarea
    id: descriere
    attributes:
      label: Descrieți problema
      description: |
        Explicați clar:
        - Ce ai așteptat să se întâmple
        - Ce s-a întâmplat de fapt
        - Pașii pentru a reproduce problema

        **Nu introduceți logurile aici.** Logurile trebuie raportate în secțiunea dedicată de mai jos.
      placeholder: |
        Exemplu:
        - Am configurat integrarea cu email-ul meu Nova și licența validă.
        - Mă așteptam ca senzorii să arate soldul și facturile, dar afișează „Licență necesară".
        - Problema apare constant, chiar și după restart.
    validations:
      required: true

  - type: input
    id: versiune_integrare
    attributes:
      label: Versiunea integrării vreaulanova
      description: O găsești în **Settings** → **Devices & Services** → Nova Power & Gas, sau în `custom_components/vreaulanova/manifest.json` (câmpul `version`).
      placeholder: "Exemplu: 1.0.0"
    validations:
      required: true

  - type: input
    id: versiune_ha
    attributes:
      label: Versiunea Home Assistant
      description: O găsești în **Settings** → **About**.
      placeholder: "Exemplu: 2025.11.0"
    validations:
      required: true

  - type: input
    id: sistem_operare
    attributes:
      label: Metoda de instalare HA
      description: Cum ai instalat Home Assistant (HAOS, Docker, Core, Supervised)?
      placeholder: "Exemplu: Home Assistant OS pe Raspberry Pi 4"
    validations:
      required: true

  - type: dropdown
    id: tip_cont
    attributes:
      label: Tipul contului Nova
      description: Ai un singur cont CRM sau mai multe conturi asociate?
      options:
        - "Selectează o opțiune…"
        - "Cont unic (un singur CRM)"
        - "Multi-account (cont principal + conturi asociate)"
        - "Nu știu"
    validations:
      required: true

  - type: markdown
    attributes:
      value: >
        ---

        ### Loguri și diagnostics

  - type: textarea
    id: loguri
    attributes:
      label: Loguri relevante
      description: |
        Activează debug logging (vezi [DEBUG.md](https://github.com/cnecrea/vreaulanova/blob/main/DEBUG.md)), reproduce problema, apoi copiază logurile filtrate după `vreaulanova`.

        Dacă logul e foarte lung, folosește `<details>` (vezi DEBUG.md secțiunea 8).
      placeholder: |
        2026-04-01 10:15:22.318 DEBUG custom_components.vreaulanova [VreauLaNova] Fetch cont principal CRM=1234567.
        2026-04-01 10:15:22.456 DEBUG custom_components.vreaulanova GET https://backend.nova-energy.ro/api/metering-points → 200 OK
        2026-04-01 10:15:22.512 DEBUG custom_components.vreaulanova [VreauLaNova] Se creează 8 senzori pentru 1 conturi.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics (opțional, dar foarte util)
      description: |
        Exportă diagnostics-ul: **Settings** → **Devices & Services** → Nova Power & Gas → ⋮ → **Download diagnostics**.
        Lipește conținutul JSON aici sau atașează fișierul la issue.

        Diagnostics-ul NU conține date personale — e safe de postat public.
      placeholder: "Lipește conținutul JSON al fișierului diagnostics aici, sau atașează-l ca fișier."
      render: json
    validations:
      required: false

  - type: dropdown
    id: restart
    attributes:
      label: Ați încercat restart la Home Assistant?
      description: Confirmă dacă ai încercat un restart complet înainte de a raporta.
      options:
        - "Selectează o opțiune…"
        - "Nu, nu am încercat restart."
        - "Da, am dat restart și problema persistă."
    validations:
      required: true

  - type: dropdown
    id: reinstalare
    attributes:
      label: Ați încercat să ștergeți și readăugați integrarea?
      description: Uneori o reinstalare curată rezolvă probleme de configurare.
      options:
        - "Selectează o opțiune…"
        - "Nu, nu am încercat."
        - "Da, am șters și readăugat integrarea, problema persistă."
    validations:
      required: true
